<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllMods | Premium Modded Games & Apps</title>
    <meta name="description" content="Download the latest modded games and apps for free. Secure, fast, and always updated.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-[Inter] text-gray-900">

    <!-- Mobile Header -->
    <div class="lg:hidden flex items-center justify-between p-4 bg-white border-b sticky top-0 z-50">
        <span class="text-2xl font-bold text-blue-600">AllMods</span>
        <button id="mobile-menu-btn" class="p-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </div>

    <div class="flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 lg:relative lg:flex flex-col w-64 bg-white border-r min-h-screen transition duration-200 ease-in-out z-40">
            <div class="p-6">
                <a href="index.html" class="text-3xl font-black text-blue-600 tracking-tight">AllMods</a>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 mt-4">
                <a href="index.html" class="nav-link active flex items-center p-3 text-gray-700 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home
                </a>
                <a href="games.html" class="nav-link flex items-center p-3 text-gray-700 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"></path></svg>
                    Games
                </a>
                <a href="apps.html" class="nav-link flex items-center p-3 text-gray-700 rounded-xl hover:bg-blue-50 hover:text-blue-600 transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Apps
                </a>
            </nav>

            <div class="p-4 border-t text-xs text-gray-400 text-center">
                &copy; 2024 AllMods.store
            </div>
        </aside>

        <!-- Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black opacity-50 z-30 hidden lg:hidden"></div>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-10 w-full">
            <header class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
                <div>
                    <h1 class="text-3xl font-bold">Featured Mods</h1>
                    <p class="text-gray-500">Handpicked premium mods for you.</p>
                </div>
                <div class="relative w-full md:w-96">
                    <input type="text" id="main-search" placeholder="Search games or categories..." class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition">
                    <svg class="w-6 h-6 text-gray-400 absolute left-4 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </header>

            <!-- Featured Section -->
            <div id="featured-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6">
                <!-- JS will inject cards here -->
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
