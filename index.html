<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllMods | Official Mod Store</title>
    <!-- Tailwind CSS for modern layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* Card Hover Effects */
        .game-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        /* Modal Blur */
        .modal-overlay {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.7);
        }

        /* Sidebar Nav */
        .nav-item.active {
            background-color: #3b82f6;
            color: white;
        }

        /* Skeleton Animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .placeholder-img {
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
        }
        @keyframes shine {
            to { background-position-x: -200%; }
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Sidebar Mobile Toggle -->
    <div class="lg:hidden flex items-center justify-between p-4 bg-white border-b sticky top-0 z-50">
        <span class="text-xl font-extrabold text-blue-600">AllMods</span>
        <button id="mobileMenuBtn" class="p-2 bg-gray-50 rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </div>

    <div class="flex">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white border-r border-gray-100 transform -translate-x-full lg:translate-x-0 lg:relative transition-transform duration-300 ease-in-out z-40 h-screen flex flex-col">
            <div class="p-8">
                <a href="#" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-blue-200">A</div>
                    <span class="text-2xl font-black text-gray-800 tracking-tight">AllMods</span>
                </a>
            </div>

            <nav class="flex-1 px-4 space-y-2 mt-4">
                <button onclick="renderAll()" class="nav-item active w-full flex items-center gap-4 px-4 py-3 rounded-xl transition font-semibold text-gray-600 hover:bg-gray-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home
                </button>
                <button onclick="filterCategory('Action')" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl transition font-semibold text-gray-600 hover:bg-gray-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Action
                </button>
                <button onclick="filterCategory('Adventure')" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl transition font-semibold text-gray-600 hover:bg-gray-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Adventure
                </button>
                <button onclick="filterCategory('Simulation')" class="nav-item w-full flex items-center gap-4 px-4 py-3 rounded-xl transition font-semibold text-gray-600 hover:bg-gray-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A10.003 10.003 0 0012 3a10.003 10.003 0 00-6.703 15.57L5 19.25a1 1 0 01-1 1H3a1 1 0 01-1-1v-1a1 1 0 011-1h.25M16.5 13.15L12 11.72M4.5 13.15L9 11.72"></path></svg>
                    Simulation
                </button>
            </nav>

            <div class="p-6">
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Status</p>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-sm font-bold text-gray-700">All Servers Online</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 h-screen overflow-y-auto bg-[#F8FAFC] p-4 lg:p-10">
            <!-- Header Section -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
                <div>
                    <h1 class="text-3xl font-black text-gray-900 tracking-tight">Browse Premium Mods</h1>
                    <p class="text-gray-500 font-medium">Safe, verified, and always up-to-date content.</p>
                </div>
                <div class="relative w-full md:w-96">
                    <input type="text" id="searchInput" placeholder="Search mods..." class="w-full pl-12 pr-4 py-4 bg-white border border-gray-100 rounded-2xl shadow-sm focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium">
                    <svg class="w-6 h-6 text-gray-300 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <!-- Content Grid -->
            <div id="gameGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-8">
                <!-- Games will be injected here -->
            </div>

            <!-- Footer -->
            <footer class="mt-20 py-10 border-t border-gray-100 text-center">
                <p class="text-gray-400 text-sm font-semibold uppercase tracking-widest">© 2024 AllMods.store • All Rights Reserved</p>
            </footer>
        </main>
    </div>

    <!-- Details Modal -->
    <div id="gameModal" class="fixed inset-0 z-[60] hidden overflow-y-auto">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="modal-overlay fixed inset-0" onclick="closeModal()"></div>
            <div class="bg-white w-full max-w-4xl rounded-[40px] shadow-2xl relative overflow-hidden transform transition-all duration-300 scale-95 opacity-0" id="modalContent">
                <!-- Modal content injected here -->
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const DOWNLOAD_URL = "https://allmods.store/download-center";

        const GAME_DATA = [
            {
                id: "pokemon-go",
                name: "Pokemon GO Spoofer",
                category: "Adventure",
                rating: "4.9",
                size: "124 MB",
                version: "0.311.2",
                image: "pokemon-go.webp",
                desc: "The #1 spoofer for Pokemon GO. Features include joystick navigation, teleportation to any coordinates, and built-in IV checkers to find 100% IV Pokemon instantly.",
                features: ["Joystick Navigation", "Safe Teleportation", "IV Checker Enabled", "Auto-Walk Mode"]
            },
            {
                id: "car-parking",
                name: "Car Parking Multiplayer Mod",
                category: "Racing",
                rating: "4.7",
                size: "580 MB",
                version: "4.8.12",
                image: "car-parking.webp",
                desc: "The ultimate driving simulator mod. Unlock all premium vehicles, get unlimited game currency, and access all car customization options for free.",
                features: ["Unlimited Money", "All Cars Unlocked", "Unlocked Engine Upgrades", "No Advertisements"]
            },
            {
                id: "toca-boca",
                name: "Toca Boca World Mod",
                category: "Simulation",
                rating: "4.8",
                size: "520 MB",
                version: "1.87",
                image: "toca-boca.webp",
                desc: "Unlock the full potential of Toca World. This mod grants access to every map location, all characters, and every piece of furniture in the game.",
                features: ["All Maps Unlocked", "All Furniture Packs", "Everything is Free", "All Character Slots"]
            },
            {
                id: "baseball9",
                name: "Baseball 9 Mod",
                category: "Sports",
                rating: "4.6",
                size: "185 MB",
                version: "3.2.1",
                image: "baseball9.webp",
                desc: "Experience high-speed, realistic baseball. Mod version includes unlimited gems and coins to max out your team's stats and gear without grinding.",
                features: ["Unlimited Gems", "Infinite Energy", "Max Player Skills", "Free Upgrades"]
            },
            {
                id: "roblox",
                name: "Roblox",
                category: "Adventure",
                rating: "4.5",
                size: "155 MB",
                version: "2.624.0",
                image: "roblox.webp",
                desc: "The massive community platform. Mod includes a multi-tool menu for wallhack, super jump, and flying across various community games.",
                features: ["Mod Menu Toggle", "Wallhack (ESP)", "Fly Mode", "God Mode (Select Games)"]
            },
            {
                id: "minecraft",
                name: "Minecraft",
                category: "Sandbox",
                rating: "4.9",
                size: "620 MB",
                version: "1.20.81",
                image: "minecraft.webp",
                desc: "Explore infinite worlds. This mod unlocks premium skins, textures, and grants immortality to survive the toughest mobs in survival mode.",
                features: ["Premium Skins Unlocked", "Unlocked Textures", "Infinite Stamina", "One-Hit Kill Tools"]
            },
            {
                id: "freefire",
                name: "Free Fire",
                category: "Action",
                rating: "4.4",
                size: "400 MB",
                version: "1.104.1",
                image: "freefire.webp",
                desc: "Ultimate battle royale experience. Mod features include visual ESP to spot enemies through walls and improved auto-aim assistance.",
                features: ["ESP Line & Box", "Aimbot Assistance", "High Damage", "Speed Boost"]
            },
            {
                id: "subway-surfers",
                name: "Subway Surfers",
                category: "Arcade",
                rating: "4.8",
                size: "168 MB",
                version: "3.29.0",
                image: "subway-surfers.webp",
                desc: "Dash as fast as you can! Get unlimited coins and keys to unlock every character, every board, and every power-up in the game instantly.",
                features: ["Unlimited Coins", "Infinite Keys", "All Boards Unlocked", "Max Multipliers"]
            },
            {
                id: "stumble-guys",
                name: "Stumble Guys",
                category: "Party",
                rating: "4.5",
                size: "210 MB",
                version: "0.71",
                image: "stumble-guys.webp",
                desc: "Massive multiplayer knockout game. Unlock all special skins, animations, and emotes to stand out in the stumbling crowd.",
                features: ["All Skins Unlocked", "Special Emotes Enabled", "No Footstep Ads", "Map Teleport Fix"]
            }
        ];

        const gameGrid = document.getElementById('gameGrid');
        const searchInput = document.getElementById('searchInput');
        const gameModal = document.getElementById('gameModal');
        const modalContent = document.getElementById('modalContent');
        const sidebar = document.getElementById('sidebar');

        // Initial render
        function renderGames(data) {
            gameGrid.innerHTML = data.map(game => `
                <div class="game-card bg-white rounded-[32px] p-4 border border-gray-100 shadow-sm cursor-pointer group" onclick="openModal('${game.id}')">
                    <div class="relative overflow-hidden rounded-[24px] mb-5 aspect-square bg-gray-100">
                        <img src="${game.image}" alt="${game.name}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" onerror="this.src='https://placehold.co/400x400/3b82f6/ffffff?text=${game.name.replace(/\s/g, '+')}'">
                        <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full text-xs font-black text-blue-600 shadow-sm border border-white/50">
                            ★ ${game.rating}
                        </div>
                    </div>
                    <div class="px-2">
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-500 block mb-2">${game.category}</span>
                        <h3 class="font-extrabold text-xl text-gray-800 leading-tight mb-4 group-hover:text-blue-600 transition">${game.name}</h3>
                        <div class="flex items-center justify-between text-gray-400 text-xs font-bold uppercase tracking-widest border-t border-gray-50 pt-4">
                            <span>${game.size}</span>
                            <span>v${game.version}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        renderGames(GAME_DATA);

        // Search logic
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = GAME_DATA.filter(g => g.name.toLowerCase().includes(val) || g.category.toLowerCase().includes(val));
            renderGames(filtered);
        });

        // Filter logic
        function filterCategory(cat) {
            const filtered = GAME_DATA.filter(g => g.category === cat);
            renderGames(filtered);
            
            // UI state
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Close mobile menu
            if (window.innerWidth < 1024) {
                sidebar.classList.add('-translate-x-full');
            }
        }

        function renderAll() {
            renderGames(GAME_DATA);
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (window.innerWidth < 1024) sidebar.classList.add('-translate-x-full');
        }

        // Modal logic
        function openModal(id) {
            const game = GAME_DATA.find(g => g.id === id);
            if (!game) return;

            modalContent.innerHTML = `
                <button onclick="closeModal()" class="absolute top-6 right-6 z-20 bg-gray-100 hover:bg-gray-200 p-2 rounded-full transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="md:flex">
                    <div class="md:w-1/2 p-8 lg:p-12">
                        <div class="rounded-[32px] overflow-hidden shadow-2xl mb-8 aspect-square border-8 border-gray-50">
                            <img src="${game.image}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x600/3b82f6/ffffff?text=${game.name.replace(/\s/g, '+')}'">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-blue-50 p-4 rounded-2xl text-center">
                                <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Version</p>
                                <p class="text-lg font-black text-blue-700">${game.version}</p>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl text-center">
                                <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Size</p>
                                <p class="text-lg font-black text-gray-700">${game.size}</p>
                            </div>
                        </div>
                    </div>
                    <div class="md:w-1/2 p-8 lg:p-12 lg:pl-0 flex flex-col justify-center">
                        <span class="inline-block px-4 py-1.5 bg-blue-100 text-blue-600 rounded-full text-xs font-black uppercase tracking-widest mb-4">${game.category}</span>
                        <h2 class="text-4xl font-black text-gray-900 mb-6 leading-tight">${game.name}</h2>
                        <p class="text-gray-500 leading-relaxed font-medium mb-8 text-lg">${game.desc}</p>
                        
                        <div class="space-y-4 mb-10">
                            ${game.features.map(f => `
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 bg-green-100 rounded-full flex items-center justify-center text-green-600">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                    </div>
                                    <span class="font-bold text-gray-700">${f}</span>
                                </div>
                            `).join('')}
                        </div>

                        <a href="${DOWNLOAD_URL}" class="flex items-center justify-center gap-3 w-full py-6 bg-blue-600 hover:bg-blue-700 text-white rounded-3xl font-black text-xl shadow-xl shadow-blue-200 transition-all transform hover:-translate-y-1">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            DOWNLOAD MOD
                        </a>
                    </div>
                </div>
            `;
            
            gameModal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                gameModal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 200);
        }

        // Mobile menu logic
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        // Close on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
