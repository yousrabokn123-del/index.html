<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exclusive Content Access</title>
    <style>

        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            text-align: center;
            overflow-x: hidden;
        }
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(236, 72, 153, 0.12) 0%, transparent 40%),

        }
        .container {

        .lock-wrapper {

            background: rgba(255, 255, 255, 0.05);

            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .lock-icon {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.8px;
            line-height: 1.1;
            background: linear-gradient(180deg, #ffffff 0%, #a1a1a1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subheadline {
            font-size: 18px;
            color: #d1d1d1;
            margin: 0 0 6px 0;
            font-weight: 500;
            line-height: 1.4;
        }
        .supporting {
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .supporting::before {
            content: "";
            width: 6px;
            height: 6px;
            background: #facc15;
            border-radius: 50%;
            box-shadow: 0 0 8px #facc15;
        }
        .trust-grid {
            width: 100%;
            margin-bottom: 48px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .trust-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
            font-size: 15px;
            font-weight: 600;
            color: #e5e5e5;
        }
        .check-circle {
            width: 20px;
            height: 20px;
            background: #ec4899;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            flex-shrink: 0;
        }
        .cta-btn {
            display: block;
            width: 100%;
            padding: 22px;
            background: linear-gradient(90deg, #ec4899 0%, #8b5cf6 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 20px;
            font-weight: 900;
            border-radius: 18px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 12px 30px rgba(236, 72, 153, 0.35);
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .cta-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        .footer {
            padding: 30px 24px;
            width: 100%;
            font-size: 10px;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="lock-wrapper">
            <svg class="lock-icon" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>

        <div class="trust-grid">

            </div>
            <div class="trust-item">

            </div>
            <div class="trust-item">

</body>
</html>
